<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-TECH Secure Payment Gateway</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --primary-color: #58a6ff;
            --success-color: #238636;
            --error-color: #f85149;
            --border-color: #30363d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .payment-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            color: #ffffff;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .order-details {
            background-color: rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 25px;
            text-align: left;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .detail-row:last-child {
            margin-bottom: 0;
        }

        .label {
            color: #8b949e;
            font-size: 0.9em;
        }

        .value {
            font-weight: bold;
            color: #ffffff;
        }

        .amount {
            font-size: 1.2em;
            color: var(--primary-color);
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #8b949e;
            font-size: 0.9em;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            background-color: #0d1117;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: #ffffff;
            font-size: 1em;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
        }

        .warning-text {
            font-size: 0.8em;
            color: #d29922;
            margin-top: 8px;
            margin-bottom: 20px;
            text-align: left;
            line-height: 1.4;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--success-color);
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #2ea043;
        }

        button:disabled {
            background-color: #23863680;
            cursor: not-allowed;
        }

        #message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            display: none;
            font-size: 0.9em;
        }

        .error {
            background-color: rgba(248, 81, 73, 0.1);
            color: var(--error-color);
            border: 1px solid rgba(248, 81, 73, 0.4);
        }

        .success {
            background-color: rgba(35, 134, 54, 0.1);
            color: var(--success-color);
            border: 1px solid rgba(35, 134, 54, 0.4);
        }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="payment-card">
        <h2>D-TECH Gateway</h2>

        <div id="loadingState">Loading payment details...</div>

        <div id="paymentForm" style="display: none;">
            <div class="order-details">
                <div class="detail-row">
                    <span class="label">Item:</span>
                    <span class="value" id="itemName">-</span>
                </div>
                <div class="detail-row">
                    <span class="label">Amount Due:</span>
                    <span class="value amount">R<span id="amountDue">0.00</span></span>
                </div>
            </div>

            <div class="input-group">
                <label for="voucherCode">Enter D-TECH Voucher Code</label>
                <input type="text" id="voucherCode" placeholder="x24-XXXX-XXXX" autocomplete="off">
            </div>

            <div class="warning-text">
                ⚠️ <strong>Important:</strong> The voucher value must match the exact Amount Due. Any extra value will be lost, as vouchers are strictly one-time use.
            </div>

            <button id="payBtn" onclick="processPayment()">
                <span id="btnText">Pay Now</span>
                <span id="btnLoader" class="loader"></span>
            </button>

            <div id="message"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://dark-mud-87fb.jonasmochebane.workers.dev"; // Adjust if different

        let orderParams = {};

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);

            orderParams = {
                amount: urlParams.get('amount'),
                item: urlParams.get('item'),
                order_id: urlParams.get('order_id'),
                return_url: urlParams.get('return_url')
            };

            const loadingState = document.getElementById('loadingState');
            const paymentForm = document.getElementById('paymentForm');
            const messageEl = document.getElementById('message');

            if (!orderParams.amount || !orderParams.item || !orderParams.order_id || !orderParams.return_url) {
                loadingState.style.display = 'none';
                showMessage('Missing required payment parameters in URL.', 'error');
                return;
            }

            document.getElementById('itemName').textContent = orderParams.item;
            document.getElementById('amountDue').textContent = parseFloat(orderParams.amount).toFixed(2);

            loadingState.style.display = 'none';
            paymentForm.style.display = 'block';
        });

        function showMessage(msg, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = msg;
            messageEl.className = type; // 'error' or 'success'
            messageEl.style.display = 'block';
        }

        async function processPayment() {
            const voucherCode = document.getElementById('voucherCode').value.trim();
            if (!voucherCode) {
                showMessage('Please enter a voucher code.', 'error');
                return;
            }

            const payBtn = document.getElementById('payBtn');
            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');

            payBtn.disabled = true;
            btnText.style.display = 'none';
            btnLoader.style.display = 'inline-block';
            document.getElementById('message').style.display = 'none';

            try {
                const response = await fetch(`${API_URL}/redeem-voucher`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        voucher: voucherCode,
                        amount: orderParams.amount,
                        order_id: orderParams.order_id
                    })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showMessage('Payment Successful! Redirecting...', 'success');

                    // Construct return URL
                    const returnUrlObj = new URL(orderParams.return_url);
                    returnUrlObj.searchParams.append('status', 'success');
                    returnUrlObj.searchParams.append('token', data.token);
                    returnUrlObj.searchParams.append('order_id', orderParams.order_id);

                    setTimeout(() => {
                        window.location.href = returnUrlObj.toString();
                    }, 1500);
                } else {
                    showMessage(data.error || 'Payment failed.', 'error');
                    payBtn.disabled = false;
                    btnText.style.display = 'inline-block';
                    btnLoader.style.display = 'none';
                }
            } catch (error) {
                showMessage('Network error. Please try again.', 'error');
                payBtn.disabled = false;
                btnText.style.display = 'inline-block';
                btnLoader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
