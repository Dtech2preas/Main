<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D-TECH Secure Gateway</title>

<style>
:root {
    --bg: #0b0f14;
    --card: rgba(22, 27, 34, 0.75);
    --border: rgba(255,255,255,0.08);
    --text: #c9d1d9;
    --primary: #00f0ff;
    --success: #00ff9c;
    --error: #ff4d4d;
}

/* BACKGROUND */
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: radial-gradient(circle at top, #0f2027, #0b0f14 60%);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

/* glowing animated lines */
body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: linear-gradient(120deg, transparent, rgba(0,255,255,0.08), transparent);
    animation: moveGlow 8s linear infinite;
}
@keyframes moveGlow {
    0% { transform: translate(-50%, -50%) rotate(0deg); }
    100% { transform: translate(-50%, -50%) rotate(360deg); }
}

/* CARD */
.payment-card {
    position: relative;
    backdrop-filter: blur(14px);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 30px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 0 40px rgba(0,255,255,0.08);
    text-align: center;
    z-index: 2;
}

/* HEADER */
h2 {
    color: #fff;
    margin-bottom: 5px;
    letter-spacing: 1px;
}

.subtitle {
    font-size: 0.8em;
    color: #8b949e;
    margin-bottom: 20px;
}

/* ORDER DETAILS */
.order-details {
    background: rgba(255,255,255,0.03);
    border-radius: 10px;
    padding: 15px;
    margin-bottom: 20px;
}

.detail-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
}

.label {
    color: #8b949e;
    font-size: 0.85em;
}

.value {
    color: #fff;
    font-weight: bold;
}

.amount {
    color: var(--primary);
    font-size: 1.2em;
}

/* INPUT */
.input-group {
    text-align: left;
    margin-bottom: 15px;
}

label {
    font-size: 0.85em;
    color: #8b949e;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #0b0f14;
    color: white;
    margin-top: 6px;
    outline: none;
    transition: 0.3s;
}

input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 10px rgba(0,255,255,0.3);
}

/* WARNING */
.warning {
    font-size: 0.75em;
    color: #ffaa00;
    margin-bottom: 20px;
    text-align: left;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(90deg, #00f0ff, #007cf0);
    color: #000;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.03);
    box-shadow: 0 0 15px rgba(0,255,255,0.5);
}

button:disabled {
    opacity: 0.5;
}

/* LOADER */
.loader {
    display: none;
    border: 3px solid rgba(255,255,255,0.2);
    border-top: 3px solid #fff;
    border-radius: 50%;
    width: 18px;
    height: 18px;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* MESSAGE */
#message {
    margin-top: 15px;
    padding: 10px;
    border-radius: 8px;
    display: none;
}

.success {
    background: rgba(0,255,156,0.1);
    color: var(--success);
    border: 1px solid rgba(0,255,156,0.4);
}

.error {
    background: rgba(255,77,77,0.1);
    color: var(--error);
    border: 1px solid rgba(255,77,77,0.4);
}

/* LOADING TEXT */
#loadingState {
    font-size: 0.9em;
    color: #8b949e;
}
</style>
</head>

<body>

<div class="payment-card">
    <h2>D-TECH Gateway</h2>
    <div class="subtitle">Secure Voucher Authentication System</div>

    <div id="loadingState">Initializing secure channel...</div>

    <div id="paymentForm" style="display:none;">
        <div class="order-details">
            <div class="detail-row">
                <span class="label">Item</span>
                <span class="value" id="itemName">-</span>
            </div>
            <div class="detail-row">
                <span class="label">Amount</span>
                <span class="value amount">R<span id="amountDue">0.00</span></span>
            </div>
        </div>

        <div class="input-group">
            <label>Voucher Code</label>
            <input type="text" id="voucherCode" placeholder="x24-XXXX-XXXX">
        </div>

        <div class="warning">
            ⚠️ Voucher must match the exact amount. Extra value will be lost.
        </div>

        <button id="payBtn" onclick="processPayment()">
            <span id="btnText">VERIFY & PAY</span>
            <span id="btnLoader" class="loader"></span>
        </button>

        <div id="message"></div>
    </div>
</div>

<script>
const API_URL = "https://dark-mud-87fb.jonasmochebane.workers.dev";
let orderParams = {};

document.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);

    orderParams = {
        amount: params.get('amount'),
        item: params.get('item'),
        order_id: params.get('order_id'),
        return_url: params.get('return_url')
    };

    if (!orderParams.amount || !orderParams.item || !orderParams.order_id || !orderParams.return_url) {
        showMessage("Invalid payment session.", "error");
        return;
    }

    document.getElementById('itemName').textContent = orderParams.item;
    document.getElementById('amountDue').textContent = parseFloat(orderParams.amount).toFixed(2);

    document.getElementById('loadingState').style.display = "none";
    document.getElementById('paymentForm').style.display = "block";
});

function showMessage(msg, type) {
    const el = document.getElementById('message');
    el.textContent = msg;
    el.className = type;
    el.style.display = "block";
}

async function processPayment() {
    const code = document.getElementById('voucherCode').value.trim();
    if (!code) return showMessage("Enter voucher code.", "error");

    const btn = document.getElementById('payBtn');
    btn.disabled = true;
    btnText.style.display = "none";
    btnLoader.style.display = "inline-block";

    try {
        const res = await fetch(`${API_URL}/redeem-voucher`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                voucher: code,
                amount: orderParams.amount,
                order_id: orderParams.order_id
            })
        });

        const data = await res.json();

        if (res.ok && data.success) {
            showMessage("Payment successful...", "success");

            const url = new URL(orderParams.return_url);
            url.searchParams.append("status", "success");
            url.searchParams.append("token", data.token);
            url.searchParams.append("order_id", orderParams.order_id);

            setTimeout(() => window.location.href = url, 1500);

        } else {
            showMessage(data.error || "Payment failed", "error");
            resetBtn();
        }

    } catch {
        showMessage("Network error.", "error");
        resetBtn();
    }
}

function resetBtn() {
    payBtn.disabled = false;
    btnText.style.display = "inline-block";
    btnLoader.style.display = "none";
}
</script>

</body>
</html>
